services:
  - type: web
    name: pika-license-server
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn license_server:APP
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: PIKA_ADMIN_PATH
        sync: false
      - key: PIKA_ADMIN_TOKEN
        sync: false
      - key: PIKA_ADMIN_PASSWORD
        sync: false
      - key: PIKA_STRICT_DEVICE_BIND
        value: "1"
      - key: PIKA_AUTO_BLOCK_SHARE
        value: "0"
      - key: PIKA_AUTO_BLOCK_THRESHOLD
        value: "5"
