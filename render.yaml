services:
  - type: web
    name: pika-license-server
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python license_server.py
    envVars:
      - key: PIKA_ADMIN_PATH
        value: pika-admin-7l728obyhd
      - key: PIKA_ADMIN_TOKEN
        value: CHANGE_ME_ADMIN_TOKEN
      - key: PIKA_ADMIN_PASSWORD
        value: CHANGE_ME_ADMIN_PASSWORD
      - key: PIKA_STRICT_DEVICE_BIND
        value: "1"
      - key: PIKA_AUTO_BLOCK_SHARE
        value: "0"
      - key: PIKA_AUTO_BLOCK_THRESHOLD
        value: "5"
